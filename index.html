<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub | Colegio Progresso</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="particles" aria-hidden="true"></canvas>

  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <span class="brand-mark-ring"></span>
      </span>
      <div>
        <h1>Colegio Progresso</h1>
        <p>Game Hub Educacional</p>
      </div>
    </div>

    <section class="wallet-panel" aria-label="Carteira do jogador">
      <div class="coin-balance">
        <span class="coin-mark" aria-hidden="true"></span>
        <strong id="coinBalance">0 moedas</strong>
      </div>
      <label class="discord-field" for="discordUserId">
        <span>Discord ID</span>
        <input id="discordUserId" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="Cole seu ID">
      </label>
    </section>

    <button id="soundToggle" class="icon-button" type="button" aria-label="Alternar sons" title="Alternar sons">S</button>
  </header>

  <main class="app-shell">
    <section class="dashboard" aria-label="Selecao de jogos">
      <div class="section-heading">
        <span>Escolha seu desafio</span>
        <h2>6 arenas prontas para jogar</h2>
      </div>
      <div id="gameGrid" class="game-grid"></div>
    </section>

    <section class="arena" aria-live="polite">
      <div class="arena-header">
        <button id="backButton" class="ghost-button" type="button">&lt; Menu</button>
        <div>
          <span id="arenaTag">Dashboard</span>
          <h2 id="gameTitle">Selecione um jogo</h2>
        </div>
      </div>
      <div id="gameMount" class="game-mount">
        <div class="empty-state">
          <span class="progress-symbol" data-label="GO">GO</span>
          <p>Escolha uma atividade para ganhar moedas, acompanhar seu saldo e explorar novos desafios.</p>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
  <script src="games/platform.js"></script>
  <script src="games/snake.js"></script>
  <script src="games/bullethell.js"></script>
  <script src="games/clicker.js"></script>
  <script src="games/jokenpo.js"></script>
  <script src="games/parkour.js"></script>
  <script src="script.js"></script>
</body>
</html>
